<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ふりがな</title>
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <div class="popup-container">
        <div class="toggle-section">
            <button id="toggle-furigana" class="btn-toggle" aria-pressed="false">
                <span id="toggle-text" data-i18n="popup_toggle_show">ふりがなを表示</span>
            </button>
        </div>

        <div class="status-section">
            <p id="status-text" aria-live="polite" data-i18n="popup_status_ready">準備完了</p>
        </div>

        <div class="quick-settings">
            <div class="quick-setting-item">
                <label for="popup-ruby-size" data-i18n-template="popup_ruby_size">ルビサイズ: <span id="popup-ruby-size-value">50</span>%</label>
                <input type="range" id="popup-ruby-size" min="30" max="100" step="5" value="50">
            </div>
            <div class="quick-setting-item">
                <label for="popup-ruby-gap" data-i18n-template="popup_ruby_gap">ルビ行間隔: <span id="popup-ruby-gap-value">1</span>px</label>
                <input type="range" id="popup-ruby-gap" min="-16" max="16" step="1" value="1">
            </div>
            <div class="quick-setting-item">
                <label>
                    <input type="checkbox" id="popup-auto-enable">
                    <span data-i18n="popup_auto_enable">自動ふりがな</span>
                </label>
            </div>
            <div class="quick-setting-item">
                <label>
                    <input type="checkbox" id="popup-reverse-ruby">
                    <span data-i18n="popup_reverse_ruby">ひらがなメイン</span>
                </label>
            </div>
        </div>

        <div class="divider"></div>

        <div class="settings-link">
            <button id="open-settings" class="btn-link" data-i18n="popup_open_settings">設定を開く</button>
        </div>
    </div>

    <script type="module" src="popup.js"></script>
</body>
</html>
